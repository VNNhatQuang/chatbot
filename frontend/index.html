<!DOCTYPE html>
<html>

<head>
    <title>Mini AI Chat</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: auto;
        }

        #chat {
            border: 1px solid #ccc;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
        }

        .msg {
            margin: 5px 0;
        }

        .user {
            color: blue;
        }

        .bot {
            color: green;
        }
    </style>
</head>

<body>

    <h2>Chatbot</h2>

    <div id="chat"></div>

    <input id="input" placeholder="Nhập câu hỏi..." style="width:80%">
    <button onclick="send()">Gửi</button>

    <script>
        async function send() {
            const input = document.getElementById("input");
            const chat = document.getElementById("chat");

            const message = input.value;
            if (!message) return;

            chat.innerHTML += `<div class="msg user">Bạn: ${message}</div>`;

            const res = await fetch("http://localhost:3000/api/v1/conversations/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });

            const data = await res.json();

            chat.innerHTML += `<div class="msg bot">Bot: ${data.reply}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;
        }
    </script>

</body>

</html>
